name: TodoFocusMac
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.michaelmjhhhh.todofocus.mac
packages:
  GRDB:
    path: ../../vendor/GRDB.swift
targets:
  TodoFocusMac:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_NAME: TodoFocusMac
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: GRDB
    scheme:
      testTargets:
        - CoreTests
        - DataTests
  CoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CoreTests
    dependencies:
      - target: TodoFocusMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TodoFocusMac.app/Contents/MacOS/TodoFocusMac"
  DataTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DataTests
    dependencies:
      - target: TodoFocusMac
      - package: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TodoFocusMac.app/Contents/MacOS/TodoFocusMac"
