name: TodoFocusMac
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.michaelmjhhhh.todofocus.mac
packages:
  GRDB:
    path: ../../vendor/GRDB.swift
targets:
  TodoFocusMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Agent/**
          - WidgetExtension/**
      - path: Assets.xcassets
        buildPhase: resources
      - path: Resources/com.todofocus.hardfocus.agent.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: TodoFocusMac
        INFOPLIST_FILE: Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: GRDB
      - target: TodoFocusAgent
        embed: true
        codeSign: false
        copy:
          destination: executables
      - target: TodoFocusWidgetExtension
        embed: true
        codeSign: false
        copy:
          destination: plugins
    scheme:
      testTargets:
        - CoreTests
        - DataTests
  TodoFocusAgent:
    type: tool
    platform: macOS
    sources:
      - path: Sources
        includes:
          - Agent/**
          - Data/Database/Migrations.swift
          - Data/DTO/HardFocusSessionRecord.swift
          - Data/DTO/AgentHeartbeatRecord.swift
          - Data/Database/DatabaseManager.swift
          - Data/Database/AppGroupDatabasePath.swift
          - Data/Repositories/HardFocusSessionRepository.swift
    settings:
      base:
        PRODUCT_NAME: TodoFocusAgent
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelmjhhhh.todofocus.agent
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: GRDB
  TodoFocusWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources
        includes:
          - WidgetExtension/**
          - Core/Review/**
          - Core/Models/Todo.swift
          - Data/DTO/TodoRecord.swift
          - Data/Database/AppGroupDatabasePath.swift
    settings:
      base:
        PRODUCT_NAME: TodoFocusWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.michaelmjhhhh.todofocus.mac.widget
        INFOPLIST_FILE: WidgetExtension-Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - package: GRDB
  CoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CoreTests
    dependencies:
      - target: TodoFocusMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TodoFocusMac.app/Contents/MacOS/TodoFocusMac"
  DataTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/DataTests
    dependencies:
      - target: TodoFocusMac
      - package: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TodoFocusMac.app/Contents/MacOS/TodoFocusMac"
