name: ci-macos-tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew update
            brew install xcodegen
          fi

      - name: Generate project
        run: xcodegen generate
        working-directory: macos/TodoFocusMac

      - name: Run tests
        run: |
          xcodebuild test \
            -project "TodoFocusMac.xcodeproj" \
            -scheme "TodoFocusMac" \
            -destination "platform=macOS"
        working-directory: macos/TodoFocusMac
